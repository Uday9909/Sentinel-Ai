global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'sentinel-ingestion'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'sentinel-processor'
    metrics_path: '/'
    static_configs:
      - targets: ['host.docker.internal:8001']
